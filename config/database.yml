default: &default
  adapter: mysql2
  reconnect: true
  encoding: "<%= OmmicomMail::Config.main_db.encoding %>"
  pool: <%= OmmicomMail::Config.main_db.pool_size %>
  username: "<%= OmmicomMail::Config.main_db.username %>"
  password: "<%= OmmicomMail::Config.main_db.password %>"
  host: "<%= OmmicomMail::Config.main_db.host %>"
  port: <%= OmmicomMail::Config.main_db.port %>
  database: "<%= OmmicomMail::Config.main_db.database %>"

development:
  <<: *default

production:
  <<: *default

test:
  <<: *default
