# Files in the config/locales directory are used for internationalization
# and are automatically loaded by Rails. If you want to use locales other
# than English, add the necessary files in this directory.
#
# To use the locales, use `I18n.t`:
#
#     I18n.t 'hello'
#
# In views, this is aliased to just `t`:
#
#     <%= t('hello') %>
#
# To use a different locale, set it with `I18n.locale`:
#
#     I18n.locale = :es
#
# This would use the information in config/locales/es.yml.
#
# To learn more, please read the Rails Internationalization guide
# available at http://guides.rubyonrails.org/i18n.html.

en:
  hello: "Xin chào"
  activerecord:
    attributes:
      organization:
        permalink: Tên ngắn
      server:
        permalink: Tên ngắn
      domain:
        verification_method: Phương thức xác minh
      http_endpoint:
        url: URL
      user:
        email_address: Địa chỉ email
      webhook:
        url: URL
        sign: Ký yêu cầu

  server_statuses:
    live: Đang hoạt động
    development: Phát triển
    suspended: Tạm ngưng
  route_spam_modes:
    quarantine: Spam sẽ được cách ly
    mark: Spam sẽ được đánh dấu

  http_endpoint_formats:
    hash: Gửi dưới dạng hash
    raw_message: Gửi dưới dạng email gốc
  http_endpoint_encodings:
    body_as_json: Gửi trong phần body dạng JSON
    form_data: Gửi dưới dạng form data

  webhook_events:
    message_sent: Email đã được gửi thành công tới endpoint SMTP hoặc HTTP.
    message_delayed: Email bị trì hoãn do endpoint nhận gặp sự cố. Hệ thống sẽ tự động thử lại.
    message_delivery_failed: Email không thể gửi tới endpoint. Đây là lỗi vĩnh viễn và hệ thống sẽ không thử lại.
    message_held: Email đã được giữ trong OmmicomMail vì đạt giới hạn hoặc máy chủ đang ở chế độ phát triển.
    message_bounced: Hệ thống đã nhận được email bounce phản hồi cho một email đã gửi trước đó.
    message_link_clicked: Một liên kết trong email gửi ra đã được nhấp.
    message_loaded: Email bạn gửi đã được mở.
    domain_dns_error: Kích hoạt khi phát hiện vấn đề cấu hình DNS của một tên miền trên máy chủ này.
    send_limit_approaching: Kích hoạt khi máy chủ mail sắp đạt giới hạn gửi. Sự kiện này chỉ gửi tối đa một lần mỗi giờ.
    send_limit_exceeded: Kích hoạt khi máy chủ mail đã vượt quá giới hạn gửi.

  currencies:
    gbp: GBP - Bảng Anh (£)
    usd: USD - Đô la Mỹ ($)
    eur: EUR - Euro (€)

  route_modes:
    accept: Nhận email nhưng không chuyển tới endpoint
    hold: Nhận email và đưa vào hàng đợi giữ
    bounce: Nhận email rồi gửi bounce ngay cho người gửi
    reject: Không nhận bất kỳ email đến nào

  renewal_issues:
    no_payment_card: Bạn chưa có thẻ thanh toán trong hồ sơ
    payment_declined: Thanh toán cho dịch vụ này đã bị từ chối
